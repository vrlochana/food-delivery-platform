server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/users/**

        - id: restaurant-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/restaurants/**

        - id: order-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/orders/**

        - id: payment-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/payments/**

  eureka:
    client:
      service-url:
        defaultZone: http://localhost:8761/eureka/